services:
  - type: web
    name: canh-sec-blog
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 120 --workers 1 --log-level debug app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
